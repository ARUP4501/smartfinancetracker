{% extends "base.html" %}
{% block title %}Login | SmartFinance{% endblock %}
{% block body %}
<main class="auth-screen">
    <section class="auth-panel">
        <a href="/" class="brand-mark">SmartFinance</a>
        <h1>Welcome back</h1>
        <form id="loginForm" class="stack-form">
            <input class="form-control form-control-lg" name="email" type="email" placeholder="Email" required>
            <input class="form-control form-control-lg" name="password" type="password" placeholder="Password" required>
            <button class="btn btn-accent btn-lg w-100" type="submit">Login</button>
        </form>
        <div class="auth-links">
            <a href="{{ url_for('web.register_page') }}">Create account</a>
            <button class="link-button" data-bs-toggle="modal" data-bs-target="#resetModal">Reset password</button>
        </div>
        <div id="authMessage" class="form-message"></div>
    </section>
</main>
<div class="modal fade" id="resetModal" tabindex="-1">
    <div class="modal-dialog">
        <form class="modal-content app-modal" id="resetRequestForm">
            <div class="modal-header"><h5 class="modal-title">Password Reset</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body"><input class="form-control" type="email" name="email" placeholder="Registered email" required></div>
            <div class="modal-footer"><button class="btn btn-accent" type="submit">Generate Token</button></div>
        </form>
    </div>
</div>
{% endblock %}
