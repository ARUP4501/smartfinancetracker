{% extends "admin/_layout.html" %}
{% block title %}Admin Transactions | SmartFinance{% endblock %}
{% block admin_title %}Transaction Monitor{% endblock %}
{% block admin_content %}
<section class="panel" style="animation: slideInUp 0.5s ease forwards;">
    <div class="panel-head">
        <h2>All User Transactions</h2>
        <div class="d-flex gap-3 align-items-center">
            <select class="form-select compact-input" id="adminTransactionType">
                <option value="">All</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
            <button class="btn btn-primary btn-sm" id="adminExportTxBtn"><i class="bi bi-download"></i> Export</button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table app-table">
            <thead><tr><th>Date</th><th>User ID</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th></tr></thead>
            <tbody id="adminTransactionsTable"></tbody>
        </table>
    </div>
    <div class="pagination-row"><button class="btn btn-ghost" id="adminPrevPage">Prev</button><span id="adminTransactionPage"></span><button class="btn btn-ghost" id="adminNextPage">Next</button></div>
</section>
{% endblock %}
