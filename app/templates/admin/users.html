{% extends "admin/_layout.html" %}
{% block title %}Admin Users | SmartFinance{% endblock %}
{% block admin_title %}User Management{% endblock %}
{% block admin_content %}
<section class="panel" style="animation: slideInUp 0.5s ease forwards;">
    <div class="panel-head">
        <div>
            <h2>Registered Users</h2>
            <span class="eyebrow" id="adminUserCount"></span>
        </div>
        <div class="d-flex align-items-center gap-3">
            <div class="admin-search-wrap">
                <label class="search-pill mb-0" style="height: 36px; width: 260px;" aria-label="Search users">
                    <i class="bi bi-search"></i>
                    <input type="search" id="adminUserSearch" placeholder="Search by name/email...">
                </label>
            </div>
            <button class="btn btn-primary" id="adminExportUsersBtn"><i class="bi bi-download"></i> Export to CSV</button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table app-table">
            <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Transactions</th><th>Joined</th><th>Actions</th></tr></thead>
            <tbody id="adminUsersTable"></tbody>
        </table>
    </div>
</section>
{% endblock %}
